<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>المنتجات | Oriflame مع رشيدة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ===== Header ===== -->
  <header class="main-header">
    <h1>مجموعات Oriflame</h1>
    <p>اختاري المجموعة لي كتهمك ودخلي شوفي التفاصيل</p>
    <a href="index.html" class="btn back-btn">⬅ الرجوع للرئيسية</a>
  </header>

  <!-- ===== فلتر البحث ===== -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 ابحثي عن منتج..." onkeyup="searchProducts()">
  </div>

  <select id="categoryFilter" onchange="filterCategory()">
    <option value="all">الكل</option>
    <option value="makeup">التجميل</option>
    <option value="skincare">العناية بالبشرة</option>
    <option value="perfume">العطور</option>
  </select>

  <!-- ===== Products Section ===== -->
  <section class="products-section">
    <div class="products-grid">

      <!-- مثال منتجات -->
      <div class="product-card" data-category="makeup">
        <img src="images/makeup1.jpg" alt="أحمر شفاه" onclick="openImage(this.src)">
        <h3>أحمر شفاه Oriflame</h3>
        <p>لون ثابت وناعم</p>
        <button onclick="addToCart('أحمر شفاه Oriflame')">أضف للسلة</button>
      </div>

      <div class="product-card" data-category="skincare">
        <img src="images/skincare1.jpg" alt="كريم مرطب" onclick="openImage(this.src)">
        <h3>كريم مرطب للبشرة</h3>
        <p>ترطيب عميق ونعومة</p>
        <button onclick="addToCart('كريم مرطب للبشرة')">أضف للسلة</button>
      </div>

      <div class="product-card" data-category="perfume">
        <img src="images/perfume1.jpg" alt="عطر نسائي" onclick="openImage(this.src)">
        <h3>عطر نسائي أنيق</h3>
        <p>رائحة ناعمة تدوم طويلاً</p>
        <button onclick="addToCart('عطر نسائي أنيق')">أضف للسلة</button>
      </div>

    </div>
  </section>

  <p>🛒 عدد المنتجات في السلة: <span id="cart-count">0</span></p>
  <button onclick="sendWhatsAppOrder()" class="btn">أرسل الطلب عبر واتساب 💬</button>

  <!-- تكبير الصور -->
  <div id="imageModal" class="image-modal" onclick="closeImage()">
    <img id="modalImg">
  </div>

  <!-- زر واتساب عائم -->
  <a href="https://wa.me/212687984742" class="whatsapp-float" target="_blank">💬</a>

  <!-- ===== JavaScript ===== -->
  <script>
    let cart = [];

    function addToCart(productName) {
      cart.push(productName);
      document.getElementById("cart-count").innerText = cart.length;
    }

    function sendWhatsAppOrder() {
      if(cart.length === 0) {
        alert("السلة فارغة!");
        return;
      }
      let message = "أريد شراء هذه المنتجات:\n" + cart.join("\n");
      let url = "https://wa.me/212687984742?text=" + encodeURIComponent(message);
      window.open(url, "_blank");
    }

    function filterCategory() {
      let filter = document.getElementById("categoryFilter").value;
      let products = document.querySelectorAll(".product-card");
      products.forEach(product => {
        product.style.display = (filter === 'all' || product.dataset.category === filter) ? "block" : "none";
      });
    }

    function searchProducts() {
      let input = document.getElementById("searchInput").value.toLowerCase();
      let products = document.querySelectorAll(".product-card");
      products.forEach(product => {
        product.style.display = product.querySelector("h3").innerText.toLowerCase().includes(input)
          ? "block" : "none";
      });
    }

    function openImage(src) {
      document.getElementById("modalImg").src = src;
      document.getElementById("imageModal").style.display = "flex";
    }

    function closeImage() {
      document.getElementById("imageModal").style.display = "none";
    }
  </script>

</body>
</html>
