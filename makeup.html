<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>جمالك مع رشيدة - منتجات التجميل</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<a href="products.html" class="back-btn">⬅️ الرجوع للمجموعات</a>
<h2 class="section-title">💄 منتجات التجميل</h2>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 ابحثي عن منتج..." onkeyup="searchProducts()">
</div>

<div class="products-grid">
  <div class="product-card">
    <img src="images/makeup1.jpg" onclick="openImage(this.src)">
    <h3>أحمر شفاه Oriflame</h3>
    <p>لون ثابت وناعم</p>
  </div>
  <div class="product-card">
    <img src="images/makeup2.jpg" onclick="openImage(this.src)">
    <h3>ماسكارا</h3>
    <p>تكثيف طبيعي</p>
  </div>
</div>

<div id="imageModal" class="image-modal" onclick="closeImage()">
  <img id="modalImg">
</div>

<a href="https://wa.me/212690731377" class="whatsapp-float" target="_blank">💬</a>

<script>
function searchProducts() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let products = document.querySelectorAll(".product-card");
  products.forEach(product => {
    product.style.display = product.innerText.toLowerCase().includes(input)
      ? "block" : "none";
  });
}
function openImage(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("imageModal").style.display="flex";
}
function closeImage(){
  document.getElementById("imageModal").style.display="none";
}
</script>

</body>
</html>
