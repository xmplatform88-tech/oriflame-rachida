<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>العطور | Oriflame مع رشيدة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<a href="products.html" class="back-btn">⬅️ الرجوع للمجموعات</a>

<h2 class="section-title">🌸 العطور</h2>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 ابحثي عن عطر..." onkeyup="searchProducts()">
</div>

<div class="products-grid">

  <div class="product-card" data-category="perfume">
    <img src="images/perfume1.jpg" alt="عطر نسائي" onclick="openImage(this.src)">
    <h3>عطر نسائي أنيق</h3>
    <p>رائحة ناعمة تدوم طويلاً</p>
    <button onclick="addToCart('عطر نسائي أنيق')">أضف للسلة</button>
  </div>

  <div class="product-card" data-category="perfume">
    <img src="images/perfume2.jpg" alt="عطر رجالي" onclick="openImage(this.src)">
    <h3>عطر رجالي فاخر</h3>
    <p>ثبات قوي ولمسة فخامة</p>
    <button onclick="addToCart('عطر رجالي فاخر')">أضف للسلة</button>
  </div>

  <div class="product-card" data-category="perfume">
    <img src="images/perfume3.jpg" alt="عطر زهري" onclick="openImage(this.src)">
    <h3>عطر زهري</h3>
    <p>منعش ومناسب للاستعمال اليومي</p>
    <button onclick="addToCart('عطر زهري')">أضف للسلة</button>
  </div>

</div>

<p>🛒 عدد المنتجات في السلة: <span id="cart-count">0</span></p>
<button onclick="sendWhatsAppOrder()" class="btn">أرسل الطلب عبر واتساب 💬</button>

<div id="imageModal" class="image-modal" onclick="closeImage()">
  <img id="modalImg">
</div>

<a href="https://wa.me/212687984742" class="whatsapp-float" target="_blank">💬</a>

<script>
let cart = [];
function addToCart(productName) { cart.push(productName); document.getElementById("cart-count").innerText = cart.length; }
function sendWhatsAppOrder() { if(cart.length===0){alert("السلة فارغة!");return;} window.open("https://wa.me/212687984742?text="+encodeURIComponent("أريد شراء هذه المنتجات:\n"+cart.join("\n")), "_blank"); }
function searchProducts() { let input=document.getElementById("searchInput").value.toLowerCase(); document.querySelectorAll(".product-card").forEach(p=>{p.style.display=p.querySelector("h3").innerText.toLowerCase().includes(input)?"block":"none";}); }
function openImage(src){document.getElementById("modalImg").src=src;document.getElementById("imageModal").style.display="flex";}
function closeImage(){document.getElementById("imageModal").style.display="none";}
</script>

</body>
</html>
